<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkit Style Store</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100">

<header class="bg-yellow-400 p-3 md:p-4 shadow-md sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center px-2 md:px-0">
        <h1 class="text-xl md:text-2xl font-bold text-black">
            QuickStore
        </h1>
    </div>
</header>

<main class="container mx-auto p-3 md:p-8">

    <h2 class="text-lg md:text-xl font-bold mb-4">
        New Arrivals
    </h2>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">

        <div class="bg-white p-3 rounded-xl shadow">
            <img
                src="https://i.ibb.co/BHY3Q6bq/SHIRT.jpg"
                alt="Premium Shirt"
                class="w-full h-52 object-contain"
            >

            <h3 class="font-semibold mt-2">
                Premium Cotton Shirt
            </h3>

            <p class="text-green-700 font-bold">
                Rs. 1,200
            </p>

            <button
                onclick="openOrderModal('Premium Cotton Shirt','1200')"
                class="w-full mt-2 border-2 border-green-600 text-green-600 font-bold py-2 rounded-lg">
                Add
            </button>
        </div>

    </div>

</main>

<!-- Modal -->

<div id="orderModal"
class="fixed inset-0 bg-black bg-opacity-60 hidden flex items-center justify-center">

    <div class="bg-white p-5 rounded-xl w-96">

        <h2 class="font-bold text-xl">
            Confirm Order
        </h2>

        <p id="selectedProductName"></p>

        <form action="https://formspree.io/f/mwvyrdaq" method="POST">

            <input type="hidden" name="Item" id="productInput">
            <input type="hidden" name="Price" id="priceInput">

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required
                class="w-full border p-2 mt-3">

            <input
                type="tel"
                name="phone"
                placeholder="WhatsApp Number"
                required
                class="w-full border p-2 mt-3">

            <textarea
                name="address"
                placeholder="Address"
                required
                class="w-full border p-2 mt-3"></textarea>

            <div class="flex gap-3 mt-4">

                <button
                    type="button"
                    onclick="closeModal()"
                    class="flex-1 bg-gray-300 py-2 rounded">
                    Back
                </button>

                <button
                    type="submit"
                    class="flex-1 bg-yellow-400 py-2 rounded">
                    Place Order
                </button>

            </div>

        </form>

    </div>

</div>

<footer class="bg-white border-t mt-12 py-6 text-center">
    <h2 class="font-bold">
        LASHKARS-STYLE-STORE
    </h2>

    <p>
        Developed by Muhammad Khateeb Ejaz
    </p>
</footer>

<script src="app.js"></script>

</body>
</html>
